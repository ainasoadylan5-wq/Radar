<!DOCTYPE html>
<html>
<head>
  <title>Radar Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <style>#map { height: 90vh; width: 100%; }</style>
</head>
<body>
  <h3>Radar Admin</h3>
  <button onclick="createLink()">Créer un lien d'invitation</button>
  <div id="map"></div>

  <script>
    var map = L.map('map').setView([-18.8792, 47.5079], 6);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    var markers = {};

    function loadDevices() {
      fetch('devices.json')
        .then(r => r.json())
        .then(devices => {
          for (const [id, pos] of Object.entries(devices)) {
            if (!markers[id]) {
              markers[id] = L.marker([pos.lat, pos.lon]).addTo(map);
            } else {
              markers[id].setLatLng([pos.lat, pos.lon]);
            }
          }
        });
    }
    setInterval(loadDevices, 2000); // rafraîchit toutes les 2s

    function createLink() {
      const token = Math.random().toString(36).substring(2,8);
      alert("Lien d'invitation: https://ton-app.onrender.com/join.php?token=" + token);
    }
  </script>
</body>
</html>
