<!DOCTYPE html>
<html>
<head>
    <title>Radar GPS</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <style>
        #map { height: 100vh; }
    </style>
</head>
<body>

<div id="map"></div>

<script>
var map = L.map('map').setView([-18.8792, 47.5079], 13);

// Carte réelle (OpenStreetMap)
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: 'Map real'
}).addTo(map);

var markers = [];

function loadDevices() {
    fetch("https://radar-iuui.onrender.com/devices")
    .then(res => res.json())
    .then(data => {

        // supprimer anciens points
        markers.forEach(m => map.removeLayer(m));
        markers = [];

        data.forEach(d => {
            var marker = L.circleMarker([d.lat, d.lon], {
                color: 'red',
                radius: 6
            }).addTo(map);

            markers.push(marker);
        });
    });
}

// refresh toutes les 2 secondes
setInterval(loadDevices, 2000);
</script>

</body>
</html>
